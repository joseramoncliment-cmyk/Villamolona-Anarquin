<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anarquín Molón - Trivial de Opo</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <h1 class="title-anton">ANARQUÍN MOLÓN</h1>
  
  <!-- Pantalla de Selección de Modo -->
  <div id="pantalla-inicio" class="glass-panel">
    <h2 style="text-align: center; margin-bottom: 2rem;">¿Listo para llorar, opositor?</h2>
    <div id="mode-selector">
      <button class="btn-cyber" id="btn-modo-trivial">Constitución Trivial</button>
      <button class="btn-cyber" id="btn-modo-test">Test-Iculo (3 Min)</button>
    </div>
  </div>

  <!-- Modo Trivial -->
  <div id="pantalla-trivial" class="glass-panel game-container hidden">
    <h2>Constitución Trivial</h2>
    
    <!-- Marcador de Anarquines -->
    <div class="anarquines-board">
      <div class="anarquin-slot anarquin-fucsia" id="slot-0" style="background-image: url('Anarquin.png')"></div>
      <div class="anarquin-slot anarquin-azul" id="slot-1" style="background-image: url('Anarquin.png')"></div>
      <div class="anarquin-slot anarquin-verde" id="slot-2" style="background-image: url('Anarquin.png')"></div>
      <div class="anarquin-slot anarquin-naranja" id="slot-3" style="background-image: url('Anarquin.png')"></div>
      <div class="anarquin-slot anarquin-rojo" id="slot-4" style="background-image: url('Anarquin.png')"></div>
      <div class="anarquin-slot anarquin-dorado" id="slot-final" style="background-image: url('Anarquin.png')" title="Victoria Final"></div>
    </div>

    <!-- Lanzar Dado UI -->
    <div id="tirada-container">
      <div class="dice-wrapper">
        <div class="dice" id="dado3d">
          <div class="dice-face face-1">FUC</div>
          <div class="dice-face face-2">AZU</div>
          <div class="dice-face face-3">VER</div>
          <div class="dice-face face-4">NAR</div>
          <div class="dice-face face-5">ROJ</div>
          <div class="dice-face face-6">⭐</div>
        </div>
      </div>
      <div style="text-align: center;">
        <button class="btn-cyber" id="btn-lanzar">Lanzar Dado</button>
      </div>
    </div>

    <!-- Zona Activa (Pregunta o Selección de Comodín) -->
    <div id="zona-activa" class="question-box hidden">
      <!-- Se inyectará contenido vía JS -->
    </div>
    
  </div>

  <!-- Modo Test -->
  <div id="pantalla-test" class="glass-panel game-container hidden">
    <h2>Test-Iculo</h2>
    <div class="timer-container" id="timer">03:00</div>
    <div id="test-progress" style="text-align: center; margin-bottom: 20px; color: var(--neon-blue);">Pregunta 1 de 10</div>
    <div id="zona-test-activa" class="question-box">
      <!-- Se inyectará contenido vía JS -->
    </div>
  </div>

  <!-- Resultado Final Pantalla -->
  <div id="pantalla-resultados" class="glass-panel game-container hidden">
    <h2 id="resultado-titulo">Fin de la tortura</h2>
    <p id="resultado-texto" style="margin: 20px 0; font-size: 1.2rem; text-align: center;"></p>
    <button class="btn-cyber" id="btn-descargar-pdf" style="display: none;">Descargar PDF Irónico</button>
    <button class="btn-cyber" onclick="location.reload()">Volver al Inicio</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
